name: SonarQube Scan

on:
  push:
    branches:
      - main
      - master

jobs:
  sonar:
    runs-on: ubuntu-latest

    steps:
      # ---------------------------
      # Checkout Code
      # ---------------------------
      - name: Checkout code
        uses: actions/checkout@v4

      # ---------------------------
      # Detect Project Type
      # ---------------------------
      - name: Detect project type
        id: detect
        run: |
          HAS_DOCKER=false
          IS_MERN=false
          FRONTEND_DIR=""
          BACKEND_DIR=""

          # Docker detection
          if [ -f "Dockerfile" ] || [ -f "docker-compose.yml" ] || [ -f "docker-compose.yaml" ]; then
            HAS_DOCKER=true
          fi

          # ── MERN: monorepo with named subdirectories ──────────────────────
          # Common naming conventions for frontend/backend folders
          for FE_CANDIDATE in frontend client web app ui; do
            if [ -f "$FE_CANDIDATE/package.json" ]; then
              FRONTEND_DIR="$FE_CANDIDATE"
              break
            fi
          done

          for BE_CANDIDATE in backend server api services; do
            if [ -f "$BE_CANDIDATE/package.json" ]; then
              BACKEND_DIR="$BE_CANDIDATE"
              break
            fi
          done

          # If both dirs found → confirmed MERN monorepo
          if [ -n "$FRONTEND_DIR" ] && [ -n "$BACKEND_DIR" ]; then
            IS_MERN=true

          # ── MERN: root-level package.json that references express ─────────
          elif [ -f "package.json" ]; then
            # Check if there's a nested React app even when root is Node/Express
            if grep -q '"express"' package.json 2>/dev/null; then
              BACKEND_DIR="."
              # Look for a React sub-project
              for FE_CANDIDATE in frontend client web app ui; do
                if [ -f "$FE_CANDIDATE/package.json" ]; then
                  FRONTEND_DIR="$FE_CANDIDATE"
                  IS_MERN=true
                  break
                fi
              done
              # Root IS both (single-repo with CRA/Vite + Express backend)
              if [ -z "$FRONTEND_DIR" ] && grep -q '"react"' package.json 2>/dev/null; then
                IS_MERN=true
                FRONTEND_DIR="."
                BACKEND_DIR="."
              fi
            elif grep -q '"react"' package.json 2>/dev/null; then
              : # plain React — handled below
            fi
          fi

          # Outputs
          echo "has_docker=$HAS_DOCKER"   >> $GITHUB_OUTPUT
          echo "is_mern=$IS_MERN"         >> $GITHUB_OUTPUT
          echo "frontend_dir=$FRONTEND_DIR" >> $GITHUB_OUTPUT
          echo "backend_dir=$BACKEND_DIR"   >> $GITHUB_OUTPUT

          # Fallback legacy type (for non-MERN paths)
          if [ "$IS_MERN" = "false" ]; then
            if [ -f "package.json" ]; then
              echo "type=react" >> $GITHUB_OUTPUT
            elif [ -f "requirements.txt" ] || [ -f "setup.py" ] || [ -f "pyproject.toml" ]; then
              if grep -qi "flask" requirements.txt 2>/dev/null; then
                echo "type=flask" >> $GITHUB_OUTPUT
              else
                echo "type=python" >> $GITHUB_OUTPUT
              fi
            else
              echo "type=unknown" >> $GITHUB_OUTPUT
            fi
          else
            echo "type=mern" >> $GITHUB_OUTPUT
          fi

          # Summary
          echo "──────── Detection Summary ────────"
          echo "Project type : $(grep '^type=' $GITHUB_OUTPUT | cut -d= -f2 || echo mern)"
          echo "MERN         : $IS_MERN"
          echo "Docker       : $HAS_DOCKER"
          echo "Frontend dir : $FRONTEND_DIR"
          echo "Backend dir  : $BACKEND_DIR"

      # ---------------------------
      # Setup Java (Required for SonarQube Scanner)
      # ---------------------------
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # ---------------------------
      # Setup Node.js
      # ---------------------------
      - name: Setup Node.js
        if: |
          steps.detect.outputs.type == 'react' ||
          steps.detect.outputs.type == 'mern'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ---------------------------
      # Setup Python
      # ---------------------------
      - name: Setup Python
        if: |
          steps.detect.outputs.type == 'python' ||
          steps.detect.outputs.type == 'flask'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # ════════════════════════════════════════════════════════════════
      #  MERN — Install & Test
      # ════════════════════════════════════════════════════════════════

      # ---------------------------
      # MERN: Install backend deps
      # ---------------------------
      - name: Install backend dependencies (MERN)
        if: steps.detect.outputs.type == 'mern'
        run: |
          BE="${{ steps.detect.outputs.backend_dir }}"
          if [ "$BE" != "." ] && [ -d "$BE" ]; then
            echo "Installing backend deps in $BE"
            cd "$BE" && npm ci
          elif [ -f "package.json" ]; then
            echo "Installing root deps"
            npm ci
          fi

      # ---------------------------
      # MERN: Install frontend deps
      # ---------------------------
      - name: Install frontend dependencies (MERN)
        if: |
          steps.detect.outputs.type == 'mern' &&
          steps.detect.outputs.frontend_dir != steps.detect.outputs.backend_dir
        run: |
          FE="${{ steps.detect.outputs.frontend_dir }}"
          if [ -n "$FE" ] && [ "$FE" != "." ] && [ -d "$FE" ]; then
            echo "Installing frontend deps in $FE"
            cd "$FE" && npm ci
          fi

      # ---------------------------
      # MERN: Run backend tests
      # ---------------------------
      - name: Run backend tests (MERN)
        if: steps.detect.outputs.type == 'mern'
        run: |
          BE="${{ steps.detect.outputs.backend_dir }}"
          TARGET="$BE"
          [ "$TARGET" = "." ] && TARGET=""
          PKG="${TARGET:+$TARGET/}package.json"

          if [ -f "$PKG" ] && grep -q '"test"' "$PKG"; then
            cd "${TARGET:-.}"
            # Install jest coverage reporter if needed
            npx --yes jest --coverage --coverageReporters=lcov --passWithNoTests 2>/dev/null || \
            npm test -- --coverage --passWithNoTests 2>/dev/null || \
            echo "Backend tests skipped or not configured"
          else
            echo "No backend test script found — skipping"
          fi
        env:
          CI: true
          NODE_ENV: test

      # ---------------------------
      # MERN: Run frontend tests
      # ---------------------------
      - name: Run frontend tests (MERN)
        if: |
          steps.detect.outputs.type == 'mern' &&
          steps.detect.outputs.frontend_dir != '.' 
        run: |
          FE="${{ steps.detect.outputs.frontend_dir }}"
          if [ -n "$FE" ] && [ -d "$FE" ] && grep -q '"test"' "$FE/package.json" 2>/dev/null; then
            cd "$FE"
            npm test -- --coverage --watchAll=false --coverageReporters=lcov 2>/dev/null || \
            npx --yes jest --coverage --coverageReporters=lcov --passWithNoTests 2>/dev/null || \
            echo "Frontend tests skipped or not configured"
          else
            echo "No frontend test script found — skipping"
          fi
        env:
          CI: true

      # ---------------------------
      # MERN: SonarQube Scan
      # Scans the entire repo; reports coverage for both layers
      # ---------------------------
      - name: SonarQube Scan (MERN)
        if: steps.detect.outputs.type == 'mern'
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_HOST_URL: http://187.127.142.34:9000/
        with:
          args: >
            -Dsonar.projectKey=${{ github.repository_owner }}_${{ github.event.repository.name }}
            -Dsonar.sources=.
            -Dsonar.login=squ_a59d4fc58ecbab4929240640afa96a317bfd9a12
            -Dsonar.javascript.lcov.reportPaths=${{ steps.detect.outputs.frontend_dir }}/coverage/lcov.info,${{ steps.detect.outputs.backend_dir }}/coverage/lcov.info
            -Dsonar.exclusions=**/node_modules/**,**/build/**,**/dist/**,**/.next/**,**/coverage/**,**/public/**,Dockerfile,docker-compose*

      # ════════════════════════════════════════════════════════════════
      #  REACT (standalone)
      # ════════════════════════════════════════════════════════════════

      - name: Install dependencies (React)
        if: steps.detect.outputs.type == 'react'
        run: npm ci

      - name: Run tests (React)
        if: steps.detect.outputs.type == 'react'
        run: npm test -- --coverage --watchAll=false --coverageReporters=lcov
        env:
          CI: true

      - name: SonarQube Scan (React)
        if: steps.detect.outputs.type == 'react'
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_HOST_URL: http://187.127.142.34:9000/
        with:
          args: >
            -Dsonar.projectKey=${{ github.repository_owner }}_${{ github.event.repository.name }}
            -Dsonar.sources=src
            -Dsonar.login=squ_a59d4fc58ecbab4929240640afa96a317bfd9a12
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info
            -Dsonar.exclusions=node_modules/**,build/**,dist/**

      # ════════════════════════════════════════════════════════════════
      #  PYTHON / FLASK
      # ════════════════════════════════════════════════════════════════

      - name: Install dependencies (Python/Flask)
        if: |
          steps.detect.outputs.type == 'python' ||
          steps.detect.outputs.type == 'flask'
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Set PYTHONPATH
        if: |
          steps.detect.outputs.type == 'python' ||
          steps.detect.outputs.type == 'flask'
        run: echo "PYTHONPATH=$PWD" >> $GITHUB_ENV

      - name: Run tests (Python/Flask)
        if: |
          steps.detect.outputs.type == 'python' ||
          steps.detect.outputs.type == 'flask'
        run: |
          if [ -d "tests" ] || [ -d "test" ]; then
            pytest tests/ --cov=. --cov-report=xml --ignore=node_modules || \
            pytest test/  --cov=. --cov-report=xml --ignore=node_modules
          else
            echo "No test directory found, generating empty coverage report"
            echo '<?xml version="1.0" ?><coverage version="1" timestamp="0" lines-valid="1" lines-covered="1" line-rate="1.0" branches-covered="0" branches-valid="0" branch-rate="0" complexity="0"><packages></packages></coverage>' > coverage.xml
          fi

      - name: Check coverage file
        if: |
          steps.detect.outputs.type == 'python' ||
          steps.detect.outputs.type == 'flask'
        run: ls -l coverage.xml

      - name: SonarQube Scan (Python/Flask)
        if: |
          steps.detect.outputs.type == 'python' ||
          steps.detect.outputs.type == 'flask'
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_HOST_URL: http://187.127.142.34:9000/
        with:
          args: >
            -Dsonar.projectKey=${{ github.repository_owner }}_${{ github.event.repository.name }}
            -Dsonar.sources=.
            -Dsonar.login=squ_a59d4fc58ecbab4929240640afa96a317bfd9a12
            -Dsonar.python.coverage.reportPaths=coverage.xml
            -Dsonar.exclusions=**/__pycache__/**,**/*.pyc,node_modules/**

      # ════════════════════════════════════════════════════════════════
      #  UNKNOWN FALLBACK
      # ════════════════════════════════════════════════════════════════

      - name: SonarQube Scan (fallback)
        if: steps.detect.outputs.type == 'unknown'
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_HOST_URL: http://187.127.142.34:9000/
        with:
          args: >
            -Dsonar.projectKey=${{ github.repository_owner }}_${{ github.event.repository.name }}
            -Dsonar.sources=.
            -Dsonar.login=squ_a59d4fc58ecbab4929240640afa96a317bfd9a12
