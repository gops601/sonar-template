name: SonarQube Scan

on:
  push:
    branches:
      - main
      - master

jobs:
  sonar:
    runs-on: self-hosted

    steps:

      - name: Checkout
        uses: actions/checkout@v4


      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17


      - name: Download Scanner
        shell: powershell
        run: |
          Invoke-WebRequest https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/5.0.1.3006/sonar-scanner-cli-5.0.1.3006-windows.zip -OutFile scanner.zip
          Expand-Archive scanner.zip -DestinationPath .
          Rename-Item sonar-scanner-5.0.1.3006-windows sonar-scanner


      - name: Create sonar-project.properties
        shell: powershell
        run: |
          echo sonar.projectKey=${{ github.event.repository.name }} > sonar-project.properties
          echo sonar.sources=. >> sonar-project.properties
          echo sonar.host.url=http://18.212.15.84:9000 >> sonar-project.properties
          echo sonar.login=YOUR_TOKEN >> sonar-project.properties


      - name: Run Scanner
        shell: cmd
        run: sonar-scanner\bin\sonar-scanner.bat
