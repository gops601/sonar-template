name: SonarQube Scan

on:
  push:
    branches:
      - main
      - master

jobs:
  sonar:
    runs-on: self-hosted

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Download SonarScanner
        shell: powershell
        run: |
          Invoke-WebRequest https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-5.0.1.3006-windows.zip -OutFile scanner.zip
          Expand-Archive scanner.zip -DestinationPath .
          Rename-Item sonar-scanner-5.0.1.3006-windows sonar-scanner

      - name: Run SonarQube Scan
        shell: powershell
        run: |
          .\sonar-scanner\bin\sonar-scanner.bat `
          -Dsonar.projectKey=student-project `
          -Dsonar.sources=. `
          -Dsonar.host.url=http://localhost:9000 `
          -Dsonar.login=${{ secrets.SONAR_TOKEN }}
